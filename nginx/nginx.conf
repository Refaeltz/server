# ─────────────────────────────────────────────────────────────────────────────
# NGINX reverse-proxy configuration
#
# Routing:
#   /      → frontend container  (port 80)
#   /api   → backend container   (port 3000)
#
# Security headers are set here so they apply to every response regardless
# of which upstream serves it.
# ─────────────────────────────────────────────────────────────────────────────

# Tune worker count to available CPU cores (auto = one per core)
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient file transfer
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Hide NGINX version from response headers
    server_tokens off;

    # Gzip compression for text-based assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # ── Upstream definitions ────────────────────────────────────────────────
    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:3000;
    }

    # ── HTTP server (port 80) ───────────────────────────────────────────────
    # When Let's Encrypt is enabled, this block redirects to HTTPS.
    # Until then it serves directly so the site works out of the box.
    server {
        listen 80;
        server_name _;          # Replace with your domain name

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"              always;
        add_header X-Content-Type-Options    "nosniff"                 always;
        add_header X-XSS-Protection          "1; mode=block"           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=()" always;
        # Uncomment and configure CSP after testing:
        # add_header Content-Security-Policy "default-src 'self'; ..." always;

        # ── Let's Encrypt ACME challenge ──────────────────────────────────
        # Certbot writes challenge files here; keep this block even after
        # switching to HTTPS.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── HTTPS redirect (enable after obtaining a certificate) ─────────
        # Uncomment to activate:
        # return 301 https://$host$request_uri;

        # ── API route → NestJS backend ────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;

            # Required for WebSocket support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Prevent timeout for long-running API calls
            proxy_read_timeout 60s;
        }

        # ── Frontend catch-all → React SPA ───────────────────────────────
        location / {
            proxy_pass         http://frontend/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS server (port 443) ─────────────────────────────────────────────
    # Uncomment this entire block after running Certbot.
    #
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     include             /etc/letsencrypt/options-ssl-nginx.conf;
    #     ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    #
    #     # Re-apply security headers inside the TLS block
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Frame-Options        "SAMEORIGIN"    always;
    #     add_header X-Content-Type-Options "nosniff"       always;
    #     add_header X-XSS-Protection       "1; mode=block" always;
    #
    #     location /api/ {
    #         proxy_pass http://backend/api/;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     location / {
    #         proxy_pass http://frontend/;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
