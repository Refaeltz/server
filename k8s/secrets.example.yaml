# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes Secret template
#
# DO NOT commit real values. Use this as a template.
#
# To create the secret:
#   kubectl create secret generic app-secrets \
#     --from-literal=MONGODB_URI='mongodb+srv://...' \
#     --from-literal=JWT_SECRET='your-secret'
#
# Or seal secrets with Sealed Secrets / External Secrets Operator for GitOps.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://user:password@cluster.mongodb.net/app"
  JWT_SECRET:  "replace-with-a-strong-random-value"
