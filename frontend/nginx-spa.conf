# Minimal NGINX config for serving a React SPA inside the frontend container.
# The outer reverse-proxy (nginx/ directory) handles TLS and routing.

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly; fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed assets (JS/CSS bundles)
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
